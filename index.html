<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelulusan MI Ma'arif NU Penaruban</title>

<!-- CONFETTI LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f5132, #198754);
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

img {
    width: 150px;
    border-radius: 50%;
    border: 4px solid gold;
}

.lulus {
    font-size: 24px;
    color: green;
    font-weight: bold;
}

/* LOCK SCREEN */
.lock {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}
</style>

</head>

<body>

<!-- LOCK -->
<div class="lock" id="lock">
<h2>🔒 PENGUMUMAN BELUM DIBUKA</h2>
<p>Akan dibuka pada:</p>
<h3>2 Juni 2026 - 17:00 WIB</h3>
<p id="countdown"></p>
</div>

<h2>🎓 PENGUMUMAN KELULUSAN</h2>
<h3>MI MA'ARIF NU PENARUBAN</h3>

<div class="container">

<h3>CEK KELULUSAN</h3>

<input type="text" id="nisn" placeholder="Masukkan NISN">
<input type="date" id="tgl">

<br>
<button onclick="cekKelulusan()">CEK HASIL</button>

<div id="hasil"></div>

</div>

<!-- QR CODE -->
<h3>Akses Cepat:</h3>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://domainanda.com">

<!-- MUSIK -->
<audio autoplay loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

// WAKTU BUKA
const buka = new Date("2026-06-02T17:00:00");

// LOCK SYSTEM
function updateCountdown() {
    const now = new Date();
    const selisih = buka - now;

    if (selisih <= 0) {
        document.getElementById("lock").style.display = "none";
        return;
    }

    const jam = Math.floor(selisih / (1000*60*60));
    const menit = Math.floor((selisih % (1000*60*60))/(1000*60));
    const detik = Math.floor((selisih % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        `${jam} jam ${menit} menit ${detik} detik`;
}

setInterval(updateCountdown,1000);

// DATA SISWA
const data = [
{nisn:"3132737298", nama:"AFFAN NUROHMAN", tgl:"2013-05-02", foto:"foto/affan.jpg"},
{nisn:"3137902370", nama:"AFIKA SAQILA FAOZIAH", tgl:"2013-10-27", foto:"foto/afika.jpg"},
{nisn:"3148234055", nama:"ALIEF WAHYU SETIADI", tgl:"2014-08-30", foto:"foto/alief.jpg"},
{nisn:"3135702985", nama:"ALIFIA IKLIL SETIAJI", tgl:"2013-06-06", foto:"foto/alifia.jpg"},
{nisn:"0142732034", nama:"ANGGUN APRILIA", tgl:"2014-04-16", foto:"foto/anggun.jpg"},
{nisn:"0142205622", nama:"ELKA KHAYRU NUROHIM", tgl:"2014-02-28", foto:"foto/elka.jpg"},
{nisn:"3147932780", nama:"FADLI NUR AKHSAN", tgl:"2014-08-09", foto:"foto/fadli.jpg"},
{nisn:"3149407184", nama:"FATHIYASA AJDAY", tgl:"2014-04-03", foto:"foto/fathiya.jpg"},
{nisn:"3149988265", nama:"FAUZAN ADLI AZHIM", tgl:"2014-05-02", foto:"foto/fauzan.jpg"},
{nisn:"3135966891", nama:"FILZAH GHASSANI", tgl:"2013-11-04", foto:"foto/filzah.jpg"},
{nisn:"3130441680", nama:"MUGHOFIR SHOLIKH", tgl:"2013-05-31", foto:"foto/mughofir.jpg"},
{nisn:"3143716296", nama:"MUHAMAD ALIF SABANI", tgl:"2014-06-19", foto:"foto/alif.jpg"},
{nisn:"3146088483", nama:"MUHAMAD BISRI MUSTAFA", tgl:"2014-06-19", foto:"foto/bisri.jpg"},
{nisn:"0135671400", nama:"MUHAMMAD KEVIN RADHINKA", tgl:"2013-05-20", foto:"foto/kevin.jpg"},
{nisn:"3149333889", nama:"MUHAMMAD RAFA AZKA PUTRA", tgl:"2014-08-24", foto:"foto/rafa.jpg"},
{nisn:"0131359869", nama:"NISA FITRI LESTARI", tgl:"2013-08-08", foto:"foto/nisa.jpg"},
{nisn:"3130678369", nama:"NOVIANA AZAHRA", tgl:"2013-11-14", foto:"foto/noviana.jpg"},
{nisn:"3136625918", nama:"RAYA AIDA FARHANA", tgl:"2013-08-12", foto:"foto/raya.jpg"},
{nisn:"3139612556", nama:"SHIDQI MUTHOBIQ", tgl:"2013-07-06", foto:"foto/shidqi.jpg"},
{nisn:"3136306931", nama:"SILFIA DEVI MULIANA", tgl:"2014-03-27", foto:"foto/silfia.jpg"},
{nisn:"0122884564", nama:"SINDI AULIA", tgl:"2012-06-30", foto:"foto/sindi.jpg"},
{nisn:"3138756078", nama:"TRI NOVITASARI", tgl:"2013-11-15", foto:"foto/tri.jpg"}
];

function cekKelulusan() {
    const nisn = document.getElementById("nisn").value;
    const tgl = document.getElementById("tgl").value;
    const hasil = document.getElementById("hasil");

    const siswa = data.find(d => d.nisn === nisn && d.tgl === tgl);

    if (siswa) {

        // CONFETTI
        confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 }
        });

        hasil.innerHTML = `
        <div class="lulus">🎉 SELAMAT! ANDA LULUS 🎉</div>
        <img src="${siswa.foto}">
        <p><b>${siswa.nama}</b></p>
        <p>NISN: ${siswa.nisn}</p>
        <p><i>Selamat atas kelulusanmu! Teruslah belajar dan raih cita-citamu!</i></p>
        `;
    } else {
        hasil.innerHTML = `<p style="color:red;">Data tidak ditemukan!</p>`;
    }
}
</script>

</body>
</html>
